name: deploy-aiinvestor

on:
  push:
    branches: [main, dev]
    paths:
      - 'AIInvestor/**'
      - '.github/workflows/deploy-aiinvestor.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]

env:
  PYTHON_VERSION: '3.11'
  AZURE_RG_PREFIX: rg-aiinvestor

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIInvestor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: AIInvestor/requirements.txt
      - run: pip install -r requirements.txt pytest pip-tools
      - run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIInvestor
    env:
      ENV_NAME: ${{ github.event.inputs.env || (github.ref_name == 'main' && 'prod' || 'dev') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group
        run: |
          RG="${AZURE_RG_PREFIX}-${ENV_NAME}"
          az group create --name "$RG" --location koreacentral --output none
          echo "RG=$RG" >> $GITHUB_ENV

      - name: Deploy infrastructure (Bicep)
        run: |
          DEPLOYER_OID=$(az ad sp show --id "${{ secrets.AZURE_DEPLOYER_CLIENT_ID }}" --query id -o tsv)
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/main.bicep \
            --parameters env=$ENV_NAME deployerObjectId=$DEPLOYER_OID \
            --output none

      - name: Read Bicep outputs
        id: bicep
        run: |
          DEP=$(az deployment group list --resource-group "$RG" --query "[0].name" -o tsv)
          OUT=$(az deployment group show --resource-group "$RG" --name "$DEP" --query properties.outputs -o json)
          echo "$OUT" | jq -r 'to_entries | .[] | "\(.key | ascii_upcase)=\(.value.value)"' >> $GITHUB_ENV

      - name: Sync secrets into Key Vault
        run: |
          az keyvault secret set --vault-name "$KEYVAULTNAME" --name telegram-bot-token       --value "${{ secrets.TELEGRAM_BOT_TOKEN }}"        --output none
          az keyvault secret set --vault-name "$KEYVAULTNAME" --name deepseek-api-key         --value "${{ secrets.DEEPSEEK_API_KEY }}"          --output none
          az keyvault secret set --vault-name "$KEYVAULTNAME" --name telegram-webhook-secret  --value "${{ secrets.TELEGRAM_WEBHOOK_SECRET }}"   --output none
          az keyvault secret set --vault-name "$KEYVAULTNAME" --name user-id-salt             --value "${{ secrets.USER_ID_SALT }}"              --output none
          if [ -n "${{ secrets.DASHBOARD_ACCESS_KEY }}" ]; then
            az keyvault secret set --vault-name "$KEYVAULTNAME" --name dashboard-access-key  --value "${{ secrets.DASHBOARD_ACCESS_KEY }}"      --output none
          else
            echo "DASHBOARD_ACCESS_KEY GitHub secret not set; skipping KV sync (operator can run 'gh secret set DASHBOARD_ACCESS_KEY' later)"
          fi

      - name: Sync TELEGRAM_OWNER_CHAT_ID app setting (plain — chat_id is not sensitive)
        run: |
          if [ -n "${{ secrets.TELEGRAM_OWNER_CHAT_ID }}" ]; then
            az functionapp config appsettings set \
              --name "$FUNCTIONAPPNAME" \
              --resource-group "$RG" \
              --settings TELEGRAM_OWNER_CHAT_ID=${{ secrets.TELEGRAM_OWNER_CHAT_ID }} \
              --output none
            echo "✓ TELEGRAM_OWNER_CHAT_ID synced"
          else
            echo "TELEGRAM_OWNER_CHAT_ID GitHub secret not set; /feedback DM will be silently dropped (logged to App Insights only)"
          fi

      - name: Build Functions package
        run: |
          pip install --quiet -r requirements.txt --target .python_packages/lib/site-packages
          zip -r ../aiinvestor.zip . -x "*.venv/*" "*.pyc" "__pycache__/*" "tests/*" "data/aiinvestor.db" "*.env"

      - name: Deploy Functions package
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$RG" \
            --name "$FUNCTIONAPPNAME" \
            --src ../aiinvestor.zip \
            --output none

      - name: Set Telegram webhook
        run: |
          WEBHOOK_URL="https://${FUNCTIONAPPHOST}/api/telegram/webhook"
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=${WEBHOOK_URL}" \
            -d "secret_token=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}" \
            -d "allowed_updates=[\"message\",\"callback_query\"]" \
            -d "drop_pending_updates=true"
          echo ""
          curl -fsS "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo"

      - name: Inject dashboard key hash into static_web/dashboard.html
        run: |
          if [ -n "${{ secrets.DASHBOARD_ACCESS_KEY }}" ]; then
            HASH=$(printf '%s' "${{ secrets.DASHBOARD_ACCESS_KEY }}" | sha256sum | cut -d' ' -f1)
            sed -i "s|__KEY_HASH__|$HASH|g" static_web/dashboard.html
            echo "✓ injected hash (length=${#HASH})"
          else
            echo "DASHBOARD_ACCESS_KEY not set; dashboard.html will keep placeholder hash (page will lock)"
          fi
          # Substitute Function App host into static page (only API base needed now)
          sed -i "s|func-aiinvestor-prod|${FUNCTIONAPPNAME}|g" static_web/dashboard.html

      - name: Inject Vibe API base into static_web/main.js
        run: |
          # Vibe 프론트 (static_web/main.js) 의 __VIBE_FUNC_BASE__ placeholder 를
          # 실제 Function App 의 /api/vibe URL 로 치환. 6 개 endpoint 호출 모두 영향.
          if [ -f static_web/main.js ]; then
            VIBE_BASE="https://${FUNCTIONAPPHOST}/api/vibe"
            sed -i "s|__VIBE_FUNC_BASE__|${VIBE_BASE}|g" static_web/main.js
            COUNT=$(grep -c "${VIBE_BASE}" static_web/main.js || echo 0)
            echo "✓ Vibe API base → ${VIBE_BASE} (${COUNT} substitutions)"
          else
            echo "static_web/main.js missing — skipping Vibe substitution"
          fi

      - name: Inject Google OAuth Client ID into Mini App
        run: |
          # Mini App (/app/index.html) 의 __GOOGLE_OAUTH_CLIENT_ID__ placeholder
          # → secrets.GOOGLE_OAUTH_CLIENT_ID 로 치환 + Key Vault 동기화.
          # secret 미설정 시 placeholder 그대로 (프론트가 "관리자 설정 필요" 표시).
          if [ -n "${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" ]; then
            sed -i "s|__GOOGLE_OAUTH_CLIENT_ID__|${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}|g" static_web/app/index.html
            az keyvault secret set --vault-name "$KEYVAULTNAME" --name google-oauth-client-id --value "${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" --output none
            az functionapp config appsettings set --name "$FUNCTIONAPPNAME" --resource-group "$RG" \
              --settings "GOOGLE_OAUTH_CLIENT_ID=@Microsoft.KeyVault(SecretUri=https://$KEYVAULTNAME.vault.azure.net/secrets/google-oauth-client-id/)" \
              --output none
            echo "✓ Google OAuth Client ID 주입"
          else
            echo "GOOGLE_OAUTH_CLIENT_ID secret 미설정 — Google 로그인 비활성 (게스트 모드만 동작)"
          fi

      - name: Get Static Web App deployment token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list --name "$STATICWEBAPPNAME" --resource-group "$RG" --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy static web content
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: AIInvestor/static_web
          api_location: ""
          output_location: ""
          skip_app_build: true
